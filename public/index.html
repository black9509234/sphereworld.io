<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>sphere.io</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f0f0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

/* ── Login ── */
#login {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #fff; z-index: 10;
}
.login-box {
  text-align: center;
}
.login-box h1 {
  font-size: 48px; font-weight: 900; letter-spacing: -2px;
  color: #1a6fff; margin-bottom: 6px;
}
.login-box p {
  color: #888; font-size: 14px; margin-bottom: 32px;
}
.login-box input {
  display: block; width: 280px; padding: 12px 16px;
  border: 2px solid #ddd; border-radius: 40px;
  font-size: 16px; outline: none; text-align: center;
  transition: border-color .2s; margin: 0 auto 14px;
}
.login-box input:focus { border-color: #1a6fff; }
.login-box button {
  width: 280px; padding: 13px;
  background: #1a6fff; border: none; border-radius: 40px;
  color: #fff; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: background .2s;
}
.login-box button:hover { background: #0050dd; }

/* ── Canvas ── */
#canvas { display: block; }

/* ── HUD ── */
#hud {
  position: fixed; top: 16px; left: 16px;
  font-size: 13px; color: #444; pointer-events: none;
  line-height: 1.7;
}
#hud strong { color: #1a6fff; }
#player-count {
  position: fixed; top: 16px; right: 16px;
  font-size: 13px; color: #888;
}
</style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div class="login-box">
    <h1>sphere.io</h1>
    <p>기하학의 세계에 오신 걸 환영합니다</p>
    <input id="inp-name" type="text" placeholder="닉네임 입력" maxlength="16" autocomplete="off" />
    <button id="play-btn">Play</button>
  </div>
</div>

<canvas id="canvas"></canvas>
<div id="hud">
  <div>위치: <strong id="pos-text">—</strong></div>
  <div>WASD / 방향키로 이동</div>
</div>
<div id="player-count">플레이어: <strong id="cnt">0</strong></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ── Resize ────────────────────────────────────────────────────────────────────
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ── State ─────────────────────────────────────────────────────────────────────
let socket;
let myId = null;
let worldW = 3000, worldH = 3000;
let snapshot = [];
const TILE = 60;

const keys = { up: false, down: false, left: false, right: false };
let lastKeys = {};

// ── Input ─────────────────────────────────────────────────────────────────────
function keyState(e, val) {
  if (e.key === 'ArrowUp'    || e.key === 'w' || e.key === 'W') keys.up    = val;
  if (e.key === 'ArrowDown'  || e.key === 's' || e.key === 'S') keys.down  = val;
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left  = val;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = val;
}
window.addEventListener('keydown', e => { keyState(e, true);  sendKeys(); });
window.addEventListener('keyup',   e => { keyState(e, false); sendKeys(); });

function sendKeys() {
  if (!socket) return;
  const changed =
    keys.up !== lastKeys.up || keys.down !== lastKeys.down ||
    keys.left !== lastKeys.left || keys.right !== lastKeys.right;
  if (changed) {
    socket.emit('keys', { ...keys });
    lastKeys = { ...keys };
  }
}

// ── Login ─────────────────────────────────────────────────────────────────────
document.getElementById('play-btn').onclick = startGame;
document.getElementById('inp-name').addEventListener('keydown', e => { if (e.key === 'Enter') startGame(); });

let gameStarted = false;
function startGame() {
  // [BUG FIX #3] 버튼 연타 또는 Enter 중복 입력 시 게임이 두 번 시작되는 문제 방지
  if (gameStarted) return;
  gameStarted = true;
  const name = document.getElementById('inp-name').value.trim() || 'Player';
  document.getElementById('login').style.display = 'none';
  connectSocket(name);
  requestAnimationFrame(loop);
}

// ── Socket ────────────────────────────────────────────────────────────────────
function connectSocket(name) {
  socket = io();

  // [BUG FIX #1] 'welcome' 핸들러가 두 번 등록되어 있었고,
  // 'connect' + 'welcome' 양쪽에서 join을 emit해 중복 join이 발생하던 문제 수정.
  // 올바른 흐름: connect → join emit → 서버가 welcome 응답 → myId/world 세팅
  socket.on('connect', () => {
    socket.emit('join', { name });
  });

  socket.on('welcome', (data) => {
    myId = data.id;
    worldW = data.worldW;
    worldH = data.worldH;
  });

  socket.on('state', (data) => {
    snapshot = data;
    document.getElementById('cnt').textContent = data.length;
  });
}

// ── Camera ────────────────────────────────────────────────────────────────────
let camX = 0, camY = 0;

function updateCamera(me) {
  const tx = me.x - canvas.width  / 2;
  const ty = me.y - canvas.height / 2;
  camX += (tx - camX) * 0.12;
  camY += (ty - camY) * 0.12;
  // [BUG FIX #2] 캔버스가 월드보다 클 경우 Math.min이 음수를 반환해 카메라가 튀는 문제 수정
  camX = Math.max(0, Math.min(Math.max(0, worldW - canvas.width),  camX));
  camY = Math.max(0, Math.min(Math.max(0, worldH - canvas.height), camY));
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawGrid() {
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1;

  const startX = Math.floor(camX / TILE) * TILE;
  const startY = Math.floor(camY / TILE) * TILE;
  const endX = camX + canvas.width  + TILE;
  const endY = camY + canvas.height + TILE;

  ctx.beginPath();
  for (let x = startX; x < endX; x += TILE) {
    const sx = x - camX;
    ctx.moveTo(sx, 0);
    ctx.lineTo(sx, canvas.height);
  }
  for (let y = startY; y < endY; y += TILE) {
    const sy = y - camY;
    ctx.moveTo(0, sy);
    ctx.lineTo(canvas.width, sy);
  }
  ctx.stroke();
}

function drawBorder() {
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 3;
  ctx.strokeRect(-camX, -camY, worldW, worldH);
}

function drawPlayer(p, isMe) {
  const sx = p.x - camX;
  const sy = p.y - camY;

  // Shadow
  ctx.beginPath();
  ctx.arc(sx, sy + 4, p.r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fill();

  // Circle
  ctx.beginPath();
  ctx.arc(sx, sy, p.r, 0, Math.PI * 2);
  ctx.fillStyle = isMe ? '#1a6fff' : '#5599ff';
  ctx.fill();

  // Stroke
  ctx.beginPath();
  ctx.arc(sx, sy, p.r, 0, Math.PI * 2);
  ctx.strokeStyle = isMe ? '#003fbb' : '#2266cc';
  ctx.lineWidth = isMe ? 3 : 2;
  ctx.stroke();

  // Name
  ctx.fillStyle = '#333';
  ctx.font = `bold 12px 'Segoe UI', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(p.name, sx, sy - p.r - 10);
}

function loop() {
  // Background
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const me = snapshot.find(p => p.id === myId);
  if (me) {
    updateCamera(me);
    document.getElementById('pos-text').textContent =
      `${Math.round(me.x)}, ${Math.round(me.y)}`;
  }

  drawGrid();
  drawBorder();

  snapshot.forEach(p => drawPlayer(p, p.id === myId));

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
